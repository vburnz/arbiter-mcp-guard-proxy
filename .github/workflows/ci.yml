name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  check-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --workspace --target x86_64-unknown-linux-musl

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Run coverage
        run: cargo tarpaulin --config tarpaulin.toml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/tarpaulin-coverage/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-check
      - name: Verify crates are publishable
        run: |
          CRATES=(
            arbiter-mcp
            arbiter-storage
            arbiter-metrics
            arbiter-audit
            arbiter-credential
            arbiter-identity
            arbiter-behavior
            arbiter-session
            arbiter-proxy
            arbiter-policy
            arbiter-oauth
            arbiter-lifecycle
            arbiter-cli
            arbiter-mcp-firewall
          )
          for crate in "${CRATES[@]}"; do
            echo "Checking $crate..."
            cargo package -p "$crate" --list --allow-dirty 2>&1
          done
