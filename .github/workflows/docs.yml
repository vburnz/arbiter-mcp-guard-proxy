name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r docs/sphinx/requirements.txt

      - name: Build Sphinx docs
        run: sphinx-build -b html docs/sphinx docs/sphinx/_build/html

      - name: Assemble site
        run: |
          mkdir _site
          cp docs/index.html docs/case-study.html _site/
          cp -r docs/styles _site/styles
          cp -r docs/demos _site/demos
          cp -r docs/sphinx/_build/html _site/docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
