services:
  # ── MCP Echo Server (mock upstream) ──────────────────────────────
  mcp-echo:
    image: python:3.12-alpine
    command: ["python3", "/app/echo-server.py", "8081"]
    volumes:
      - ./docker/echo-server.py:/app/echo-server.py:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── Keycloak (Identity Provider) ─────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "9090"
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/arbiter-realm.json:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9090 && echo -e 'GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q UP || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Arbiter Gateway ─────────────────────────────────────────────
  arbiter:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - arbiter
      - --config
      - /etc/arbiter/arbiter.toml
      - --log-level
      - info
    volumes:
      - ./docker/arbiter-scenario-compose.toml:/etc/arbiter/arbiter.toml:ro
      - arbiter-audit:/var/log/arbiter
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      mcp-echo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Init: register demo agent ──────────────────────────────────
  init-agent:
    image: alpine:3.21
    command: ["/bin/sh", "/app/init-agent.sh"]
    volumes:
      - ./docker/init-agent.sh:/app/init-agent.sh:ro
    depends_on:
      arbiter:
        condition: service_healthy
    restart: "no"

volumes:
  arbiter-audit:
