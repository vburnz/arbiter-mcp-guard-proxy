# Demo 03: Tool Escalation
# Agent session is scoped to read-only tools. Trying delete_file is blocked.

[proxy]
listen_addr = "127.0.0.1"
listen_port = 8080
upstream_url = "http://127.0.0.1:8081"
require_session = true
strict_mcp = true

[sessions]
default_time_limit_secs = 3600
default_call_budget = 100

[audit]
enabled = true

[metrics]
enabled = true

[admin]
listen_addr = "127.0.0.1"
listen_port = 3000
api_key = "demo-key"
signing_secret = "demo-secret"
token_expiry_secs = 3600

# Permissive policy: allow all file operations so the session whitelist
# (Stage 7) is the enforcement layer tested by this demo.
[[policy.policies]]
id = "allow-all-file-ops"
effect = "allow"
allowed_tools = ["read_file", "list_dir", "delete_file"]
