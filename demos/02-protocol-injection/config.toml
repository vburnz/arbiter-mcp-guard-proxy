# Demo 02: Protocol Injection
# Arbiter rejects non-MCP POST bodies in strict mode.

[proxy]
listen_addr = "127.0.0.1"
listen_port = 8080
upstream_url = "http://127.0.0.1:8081"
require_session = true
strict_mcp = true

[sessions]
default_time_limit_secs = 3600
default_call_budget = 100

[audit]
enabled = true

[metrics]
enabled = true

[admin]
listen_addr = "127.0.0.1"
listen_port = 3000
api_key = "demo-key"
signing_secret = "demo-secret"
token_expiry_secs = 3600
