# Arbiter E2E configuration: Demo 10 (Credential Leakage via Response).
# Upstream points to tainted-echo which returns leaked credentials on
# alternating calls. Credential scrubbing catches injected secrets in
# responses and replaces them with [CREDENTIAL].

[proxy]
listen_addr = "0.0.0.0"
listen_port = 8080
upstream_url = "http://tainted-echo:8081"
require_session = true
strict_mcp = true

[sessions]
default_time_limit_secs = 3600
default_call_budget = 100

[credentials]
provider = "file"
file_path = "credentials.toml"

[audit]
enabled = true

[metrics]
enabled = true

[admin]
listen_addr = "0.0.0.0"
listen_port = 3000
api_key = "demo-key"
signing_secret = "demo-secret"
token_expiry_secs = 3600
