# Arbiter configuration for docker-compose quickstart.

[proxy]
listen_addr = "0.0.0.0"
listen_port = 8080
upstream_url = "http://mcp-echo:8081"

[audit]
enabled = true
file_path = "/var/log/arbiter/audit.jsonl"
redaction_patterns = ["password", "secret", "token", "key"]

[metrics]
enabled = true

[admin]
listen_addr = "0.0.0.0"
listen_port = 3000
api_key = "arbiter-quickstart-key"
signing_secret = "quickstart-secret-do-not-use-in-production"
token_expiry_secs = 3600
